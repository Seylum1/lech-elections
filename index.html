async function sha256(t) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(t));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function sget(k) {
  try {
    const r = await fetch(SCRIPT_URL + "?action=get&key=" + encodeURIComponent(k));
    const d = await r.json();
    return (d.success && d.value != null && d.value !== "") ? JSON.parse(d.value) : null;
  } catch(e) { console.error("sget fail", k, e); return null; }
}

async function sset(k, v) {
  try {
    await fetch(SCRIPT_URL, {
      method:  "POST",
      mode:    "no-cors",
      headers: { "Content-Type": "text/plain" },
      body:    JSON.stringify({ action: "set", key: k, value: JSON.stringify(v) }),
    });
  } catch(e) { console.error("sset fail", k, e); }
}

function Btn({ children, onClick, variant="primary", disabled, small, full, style:extra={} }) {
  const base = {
    fontFamily:"'Cinzel',serif", letterSpacing:"0.12em", textTransform:"uppercase", fontWeight:700,
    fontSize: small ? 10 : 11,
    padding: small ? "4px 12px" : full ? "10px 0" : "8px 20px",
    width: full ? "100%" : "auto",
    border: "1px solid", borderRadius: 2,
    cursor: disabled ? "not-allowed" : "pointer",
    opacity: disabled ? 0.45 : 1,
    transition: "all .16s",
  };
  const vars = {
    primary: { background:`linear-gradient(135deg,${C.redD},${C.red})`, borderColor:C.redD, color:C.text },
    ghost:   { background:"transparent", borderColor:C.border, color:C.textD },
    gold:    { background:"linear-gradient(135deg,#3a2e00,#5a4800)", borderColor:"#6a5600", color:C.gold },
    green:   { background:"linear-gradient(135deg,#0a2a0a,#1a5a1a)", borderColor:"#1a4a1a", color:"#7ad47a" },
    danger:  { background:"transparent", borderColor:"#5a1818", color:C.redL },
    orange:  { background:"linear-gradient(135deg,#3a1e00,#6a3800)", borderColor:"#7a4400", color:"#f0a050" },
    armed:   { background:"linear-gradient(135deg,#5a0000,#900000)", borderColor:"#aa0000", color:"#ffcccc" },
  };
  return (
    <button onClick={disabled ? undefined : onClick} style={{...base,...vars[variant],...extra}}>
      {children}
    </button>
  );
}

/* Two-step "arm then confirm" button — no modal needed */
function ArmBtn({ label, confirmLabel, onConfirm, variant="danger", small }) {
  const [armed, setArmed] = useState(false);
  const timer = useRef(null);
  const arm = () => {
    setArmed(true);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => setArmed(false), 4000);
  };
  const confirm = () => { clearTimeout(timer.current); setArmed(false); onConfirm(); };
  return armed
    ? <Btn variant="armed" small={small} onClick={confirm}>{confirmLabel || "Confirm?"}</Btn>
    : <Btn variant={variant} small={small} onClick={arm}>{label}</Btn>;
}

  if (!msg) return null;
  return (
    <div style={{ position:"fixed", top:14, right:14, zIndex:9999, background:C.s1,
                  border:`1px solid ${color}55`, borderLeft:`3px solid ${color}`,
                  padding:"7px 14px", borderRadius:2, fontFamily:"'Cinzel',serif",
                  fontSize:10, color, letterSpacing:"0.1em", animation:"fadeUp .2s ease" }}>
      {msg}
    </div>
  );
}

/* ── Seat calculation ───────────────────────────────────── */
function calcSeats(candidates, votes) {
  const cands = (candidates || []).filter(c => c.status === "approved");
  const vc = {}; cands.forEach(c => { vc[c.id] = 0; });
  Object.values(votes || {}).filter(v => v.status === "approved").forEach(v => {
    (v.candidates || []).forEach(cid => { if (vc[cid] !== undefined) vc[cid]++; });
  });
  const qualTotal = cands.filter(c => (vc[c.id]||0) >= MIN_VOTES).reduce((a,c) => a+(vc[c.id]||0), 0);
  return cands.map(c => ({
    ...c,
    voteCount: vc[c.id] || 0,
    seats: qualTotal > 0 && (vc[c.id]||0) >= MIN_VOTES
      ? Math.round(((vc[c.id]||0) / qualTotal) * TOTAL_SEATS) : 0,
    qualifies: (vc[c.id]||0) >= MIN_VOTES,
  }));
}

function getProjection(results) {
  const q = (results || []).filter(r => r.qualifies);
  if (!q.length) return null;
  const ps = {};
  q.forEach(r => { ps[r.party] = (ps[r.party]||0) + r.seats; });
  const sorted = Object.entries(ps).sort((a,b) => b[1]-a[1]);
  const [topId, topS] = sorted[0];
  const topP = PARTIES.find(p => p.id === topId);
  if (topS > 500) return { label:`${topP.name} Majority Government`,  sub:`${topS} of 1,000 seats — ${topS-500} seat majority`, color:topP.color, icon:"⚜", tier:"majority" };
  if (sorted.length >= 2) {
    const [s2id, s2s] = sorted[1];
    const s2P = PARTIES.find(p => p.id === s2id);
    if (topS + s2s > 500)
      return { label:`${topP.name} Minority Government`, sub:`${topS} seats — possible coalition with ${s2P.name} (${topS+s2s} combined)`, color:topP.color, icon:"⚖", tier:"minority" };
    return { label:"Hung Parliament", sub:`${topP.name} largest party · coalition negotiations required`, color:C.gold, icon:"⚠", tier:"hung" };
  }
  return { label:`${topP.name} Minority Government`, sub:`${topS} seats — no coalition partner`, color:topP.color, icon:"⚖", tier:"minority" };
}

/* ── Seat Bar ────────────────────────────────────────────── */
function SeatBar({ results }) {
  const q   = (results||[]).filter(c => c.qualifies);
  const tot = q.reduce((a,c) => a+c.seats, 0);
  return (
    <div style={{ marginBottom:"1.25rem" }}>

                    border:`1px solid ${C.border}`, position:"relative" }}>
        {q.map(c => {
          const p = PARTIES.find(x => x.id===c.party);
          const pct = tot>0 ? (c.seats/tot)*100 : 0;
          return pct>0 ? <div key={c.id} title={`${c.name} — ${c.seats} seats`}
            style={{ width:`${pct}%`, background:p?.color||"#666", transition:"width .9s ease" }}/> : null;

  const dispEl    = view || election;

  const results    = calcSeats(dispCands, dispVotes).sort((a,b) => b.seats-a.seats||b.voteCount-a.voteCount);
  const proj       = getProjection(results);
  const totalBallots = Object.values(dispVotes||{}).filter(v => v.status==="approved").length;

        {view

          Certified {fmtDate(view.certifiedAt)} · {view.ballotCount||0} approved ballots

/* ── Vote ────────────────────────────────────────────────── */
function Vote({ candidates, election, votes, onVote }) {
  const [username, setUsername] = useState("");
  const [selected, setSelected] = useState([]);
  const [done, setDone]         = useState(false);
  const [err, setErr]           = useState("");

  const approved   = (candidates||[]).filter(c => c.status==="approved");
  const key        = username.trim().toLowerCase();
  const existing   = key ? (votes||{})[key] : null;
  const isClosed   = election?.status==="closed" || election?.status==="certified";

  const toggle = id => {
    if (selected.includes(id)) { setSelected(s => s.filter(x=>x!==id)); return; }
    if (selected.length >= MAX_PICKS) { setErr(`Maximum ${MAX_PICKS} candidates.`); return; }
    setSelected(s => [...s, id]); setErr("");
  };

  const submit = () => {
    if (!key || !selected.length) { setErr("Enter your username and select at least one candidate."); return; }
    if (existing && existing.status !== "refused") { setErr("This username has already submitted a ballot."); return; }
    onVote(key, selected);
    setDone(true);
  };

  // Closed / not open states
  if (isClosed) return (
    <Card style={{ padding:"2rem" }}>
      <div style={{ fontFamily:"'Cinzel',serif", fontSize:14, color:C.gold, marginBottom:"0.75rem" }}>
        This election has concluded.
      </div>
      <div style={{ fontSize:15, color:C.textD, fontStyle:"italic" }}>
        Voting is closed. You can view the final results on the Results tab.
      </div>
    </Card>
  );

  if (election?.status !== "open") return (
    <Card style={{ textAlign:"center", padding:"2.5rem" }}>
      <div style={{ fontSize:15, color:C.textD, fontStyle:"italic" }}>Voting is not currently open.</div>
    </Card>
  );

  if (done) return (
    <Card style={{ textAlign:"center", padding:"2.5rem" }}>
      <div style={{ fontSize:30, marginBottom:10 }}>📜</div>
      <div style={{ fontFamily:"'Cinzel',serif", fontSize:16, color:C.text, marginBottom:6 }}>Ballot Submitted</div>
      <div style={{ fontSize:15, color:C.textD, fontStyle:"italic" }}>Your ballot is pending Imperial verification.</div>
    </Card>
  );

  return (
    <div className="fu">
      <STitle>Cast Your Vote</STitle>
      {existing?.status==="refused" && (
        <div style={{ background:"#1a0a0a", border:`1px solid ${C.redL}55`, borderLeft:`3px solid ${C.redL}`,
                      padding:".7rem 1rem", marginBottom:"1rem", borderRadius:"0 3px 3px 0",
                      fontFamily:"'Cinzel',serif", fontSize:11, color:C.redL }}>
          ⚠ Your previous ballot was refused. Please re-submit.
        </div>
      )}
      <div style={{ marginBottom:"1.1rem" }}>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:10, color:C.textD, letterSpacing:"0.1em", marginBottom:5 }}>YOUR LECH USERNAME</div>
        <Inp value={username} onChange={v => { setUsername(v); setErr(""); }} placeholder="Your exact in-game username"/>
        {existing?.status==="pending"  && <div style={{ fontSize:13, color:C.gold,  fontStyle:"italic", marginTop:4 }}>Ballot awaiting Imperial approval.</div>}
        {existing?.status==="approved" && <div style={{ fontSize:13, color:C.green, fontStyle:"italic", marginTop:4 }}>Your ballot has been counted.</div>}
        {err && <div style={{ fontSize:13, color:C.redL, fontStyle:"italic", marginTop:4 }}>{err}</div>}
      </div>
      <div style={{ marginBottom:"1.1rem" }}>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:10, color:C.textD, letterSpacing:"0.1em", marginBottom:4 }}>SELECT UP TO {MAX_PICKS} CANDIDATES</div>
        <div style={{ fontSize:13, color:C.textD, fontStyle:"italic", marginBottom:8 }}>{selected.length}/{MAX_PICKS} selected</div>
        {approved.length === 0
          ? <div style={{ fontSize:15, color:C.textD, fontStyle:"italic" }}>No approved candidates yet.</div>
          : approved.map(c => {
              const p = PARTIES.find(x => x.id===c.party);
              const sel = selected.includes(c.id);
              return (
                <label key={c.id}
                  style={{ display:"flex", alignItems:"flex-start", gap:".7rem", padding:".85rem 1rem", marginBottom:5,
                            background:sel?C.s3:C.s2, border:`1px solid ${sel?p?.color||C.redD:C.border}`,
                            borderRadius:3, cursor:"pointer", transition:"all .14s" }}>
                  <input type="checkbox" checked={sel} onChange={() => toggle(c.id)} style={{ marginTop:4, accentColor:p?.color||C.red }}/>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
                      <span style={{ fontFamily:"'Cinzel',serif", fontSize:14, color:C.text, fontWeight:600 }}>{c.name}</span>
                      <PartyBadge pid={c.party}/>
                    </div>
                    <div style={{ fontSize:14, color:C.textD, fontStyle:"italic", lineHeight:1.6 }}>{c.platform}</div>
                  </div>
                </label>
              );
            })
        }
      </div>
      <Btn onClick={submit} disabled={!key || !selected.length || (!!existing && existing.status!=="refused")} full>
        ⚜ Submit Ballot
      </Btn>
    </div>
  );
}

/* ── Admin ───────────────────────────────────────────────── */
function Admin({ candidates, setCandidates, election, setElection, votes, setVotes, elHistory, setElHistory, notify }) {
  const [pw, setPw]           = useState("");
  const [authed, setAuthed]   = useState(false);
  const [storedHash, setStoredHash] = useState(null);
  const [newPw, setNewPw]     = useState("");
  const [elName, setElName]   = useState("");
  const [loading, setLoading] = useState(false);

  useEffect(() => { sget("bh-admin-hash").then(h => setStoredHash(h)); }, []);

  const tryAuth = async () => {
    setLoading(true);
    const h = await sha256(pw);
    if (!storedHash) { await sset("bh-admin-hash", h); setStoredHash(h); setAuthed(true); notify("Passphrase set.", C.gold); }
    else if (h === storedHash) { setAuthed(true); notify("Access granted.", C.gold); }
    else { notify("Incorrect passphrase.", C.redL); }
    setLoading(false); setPw("");
  };

  const changePass = async () => {
    if (!newPw.trim()) return;
    const h = await sha256(newPw);
    await sset("bh-admin-hash", h); setStoredHash(h); setNewPw("");
    notify("Passphrase updated.", C.gold);
  };

  /* Candidate actions */
  const approveCand = id => setCandidates(cs => cs.map(c => c.id===id ? {...c,status:"approved"} : c));
  const rejectCand  = id => setCandidates(cs => cs.map(c => c.id===id ? {...c,status:"rejected"} : c));
  const removeCand  = id => { setCandidates(cs => cs.filter(c => c.id!==id)); notify("Candidate removed.", C.redL); };

  /* Ballot actions */
  const approveBallot = u => { setVotes(v => ({...v, [u]:{...v[u], status:"approved"}})); notify(`Ballot approved: ${u}`); };
  const refuseBallot  = u => { setVotes(v => ({...v, [u]:{...v[u], status:"refused"}}));  notify(`Ballot refused — ${u} must re-vote.`, C.redL); };

  /* Wipe only ballots, preserve candidates + election */
  const wipeBallots = () => {
    setVotes({});
    notify("All ballots wiped.", C.redL);
  };

  /* Full reset — clear everything for current election */
  const fullReset = () => {
    setCandidates([]);
    setVotes({});
    setElection(null);
    notify("All election data cleared.", C.redL);
  };

  /* Open / close / certify */
  const openElection = () => {
    if (!elName.trim()) return;
    setElection({ status:"open", name:elName.trim(), openedAt:Date.now() });
    notify("Election opened.");
    setElName("");
  };

  const closeElection = () => {
    setElection(e => ({ ...e, status:"closed", closedAt:Date.now() }));
    notify("Voting closed. Election is now done.", C.gold);
  };

  const certify = async () => {
    const voteSnap = {};
    Object.entries(votes||{}).filter(([,v]) => v.status==="approved").forEach(([k,v]) => { voteSnap[k] = v; });
    const record = {
      ...election, status:"certified", certifiedAt:Date.now(),
      candidateSnapshot:[...candidates],
      voteSnapshot: voteSnap,
      ballotCount: Object.values(votes||{}).filter(v=>v.status==="approved").length,
    };
    const hist = [record, ...(elHistory||[])].slice(0, 30);
    setElection({ ...record });
    setElHistory(hist);
    await sset("bh-election-history", hist);
    notify("Election certified and archived.", C.gold);
  };

  const deleteRecord = async i => {
    const h = (elHistory||[]).filter((_,j) => j!==i);
    setElHistory(h);
    await sset("bh-election-history", h);
    notify("Record deleted.", C.redL);
  };

  /* Derived */
  const pendingCands   = (candidates||[]).filter(c => c.status==="pending");
  const approvedCands  = (candidates||[]).filter(c => c.status==="approved");
  const pendingBallots = Object.entries(votes||{}).filter(([,v]) => v.status==="pending");
  const results        = calcSeats(candidates, votes).sort((a,b) => b.seats-a.seats);

  if (!authed) return (
    <div className="fu" style={{ maxWidth:400, margin:"0 auto", paddingTop:"1rem" }}>
      <Card>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:16, color:C.text, fontWeight:600, marginBottom:4 }}>Imperial Admin Access</div>
        <div style={{ fontSize:14, color:C.textD, fontStyle:"italic", marginBottom:"1.25rem" }}>
          {!storedHash ? "No passphrase set — enter one to initialise." : "Enter your Imperial passphrase."}
        </div>
        <Inp value={pw} onChange={setPw} placeholder={storedHash?"Passphrase":"Create passphrase"} type="password" style={{marginBottom:10}}/>
        <Btn onClick={tryAuth} disabled={loading||!pw.trim()} full>{loading?"Verifying…":"⚜ Enter"}</Btn>
      </Card>
    </div>
  );

  return (
    <div className="fu">

      {/* ── Election Control ── */}
      <Card style={{ marginBottom:"1.5rem", borderTop:`2px solid ${C.gold}` }}>
        <STitle style={{ color:C.gold, borderColor:`${C.gold}44` }}>Election Control</STitle>

        {(!election || election.status==="certified") ? (
          <div style={{ display:"flex", gap:".5rem", alignItems:"flex-end", flexWrap:"wrap" }}>
            <div style={{ flex:1, minWidth:200 }}>
              <div style={{ fontFamily:"'Cinzel',serif", fontSize:10, color:C.textD, letterSpacing:"0.1em", marginBottom:5 }}>ELECTION NAME</div>
              <Inp value={elName} onChange={setElName} placeholder="e.g. March 2026 Bundestag Election"/>
            </div>
            <Btn variant="gold" onClick={openElection} disabled={!elName.trim()}>⚜ Open Election</Btn>
          </div>
        ) : (
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:"1rem", marginBottom:"1rem", flexWrap:"wrap" }}>
              <span style={{ fontFamily:"'Cinzel',serif", fontSize:15, color:C.text, fontWeight:600 }}>{election.name}</span>
              <span style={{ fontFamily:"'Cinzel',serif", fontSize:9, letterSpacing:"0.15em", padding:"2px 8px", borderRadius:2,
                             background:election.status==="open"?"#0a1a0a":"#1a1a0a",
                             color:election.status==="open"?C.green:C.gold,
                             border:`1px solid ${election.status==="open"?C.green:C.gold}44` }}>
                {election.status==="open" ? "● VOTING OPEN" : "■ VOTING CLOSED"}
              </span>
              <span style={{ fontSize:13, color:C.textD }}>
                {Object.values(votes||{}).filter(v=>v.status==="approved").length} approved ballots
              </span>
            </div>
            <div style={{ display:"flex", gap:".5rem", flexWrap:"wrap", alignItems:"center" }}>
              {election.status==="open" && (
                <ArmBtn
                  label="■ Close Voting"
                  confirmLabel="Confirm — Close?"
                  onConfirm={closeElection}
                  variant="danger"
                />
              )}
              {election.status==="closed" && (
                <Btn variant="gold" onClick={certify}>⚜ Certify &amp; Archive</Btn>
              )}
              <ArmBtn label="↺ Wipe Ballots"  confirmLabel="Wipe all ballots?" onConfirm={wipeBallots} variant="orange"/>
              <ArmBtn label="✕ Reset All Data" confirmLabel="Reset everything?" onConfirm={fullReset}   variant="ghost" />
            </div>
          </div>
        )}
      </Card>

      {/* ── Pending Ballots ── */}
      {pendingBallots.length > 0 && (
        <div style={{ marginBottom:"1.5rem" }}>
          <STitle>Pending Ballots ({pendingBallots.length})</STitle>
          {pendingBallots.map(([u, b]) => {
            const cands = (candidates||[]).filter(c => (b.candidates||[]).includes(c.id));
            return (
              <Card key={u} style={{ marginBottom:7, borderLeft:`3px solid ${C.gold}`, borderRadius:"0 3px 3px 0" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:"1rem", flexWrap:"wrap" }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:"'Cinzel',serif", fontSize:13, color:C.text, fontWeight:600, marginBottom:5 }}>{u}</div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                      {cands.map(c => (
                        <div key={c.id} style={{ display:"flex", alignItems:"center", gap:5, background:C.s3,
                                                  border:`1px solid ${C.border}`, borderRadius:3, padding:"3px 8px" }}>
                          <span style={{ fontSize:13, color:C.text }}>{c.name}</span>
                          <PartyBadge pid={c.party}/>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:5, flexShrink:0 }}>
                    <Btn variant="green"  small onClick={() => approveBallot(u)}>✓ Approve</Btn>
                    <Btn variant="orange" small onClick={() => refuseBallot(u)}>↩ Refuse</Btn>
                  </div>
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {/* ── Seat Projection (admin preview) ── */}
      {approvedCands.length > 0 && (
        <Card style={{ marginBottom:"1.5rem" }}>
          <STitle>Live Seat Projection</STitle>
          <SeatBar results={results}/>
          <ProjBanner proj={getProjection(results)}/>
          <div style={{ display:"flex", flexWrap:"wrap", gap:".7rem" }}>
            {results.filter(c=>c.qualifies).map(c => {
              const p = PARTIES.find(x=>x.id===c.party);
              return <div key={c.id} style={{ fontSize:13, color:C.textD }}><span style={{ color:p?.color }}>{c.name}</span>: <strong style={{ color:C.text }}>{c.seats} seats</strong></div>;
            })}
          </div>
        </Card>
      )}

      {/* ── Pending Candidates ── */}
      {pendingCands.length > 0 && (
        <div style={{ marginBottom:"1.5rem" }}>
          <STitle>Pending Candidates ({pendingCands.length})</STitle>
          {pendingCands.map(c => (
            <Card key={c.id} style={{ marginBottom:7, borderLeft:`3px solid ${C.gold}`, borderRadius:"0 3px 3px 0" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:"1rem" }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                    <span style={{ fontFamily:"'Cinzel',serif", fontSize:14, color:C.text, fontWeight:600 }}>{c.name}</span>
                    <PartyBadge pid={c.party}/>
                  </div>
                  <div style={{ fontSize:14, color:C.textD, fontStyle:"italic", lineHeight:1.6 }}>{c.platform}</div>
                </div>
                <div style={{ display:"flex", gap:5, flexShrink:0 }}>
                  <Btn variant="green"  small onClick={() => approveCand(c.id)}>✓ Approve</Btn>
                  <Btn variant="danger" small onClick={() => rejectCand(c.id)}>✗ Reject</Btn>
                </div>
              </div>
            </Card>
          ))}
        </div>
      )}

      {/* ── Approved Candidates list ── */}
      {approvedCands.length > 0 && (
        <div style={{ marginBottom:"1.5rem" }}>
          <STitle>Approved Candidates ({approvedCands.length})</STitle>
          {approvedCands.map(c => (
            <div key={c.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                                      padding:"7px 11px", background:C.s2, border:`1px solid ${C.border}`,
                                      borderRadius:3, marginBottom:4, gap:".7rem" }}>
              <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                <span style={{ fontFamily:"'Cinzel',serif", fontSize:13, color:C.text }}>{c.name}</span>
                <PartyBadge pid={c.party}/>
              </div>
              <button onClick={() => removeCand(c.id)}
                style={{ background:"none", border:"none", color:C.redD, cursor:"pointer", fontSize:14 }}>✕</button>
            </div>
          ))}
        </div>
      )}

      {/* ── Archived Records ── */}
      {(elHistory||[]).length > 0 && (
        <div style={{ marginBottom:"1.5rem" }}>
          <STitle>Archived Election Records ({elHistory.length})</STitle>
          {elHistory.map((rec, i) => {
            const recResults = rec.candidateSnapshot ? calcSeats(rec.candidateSnapshot, rec.voteSnapshot) : [];
            const recProj = getProjection(recResults);
            return (
              <Card key={i} style={{ marginBottom:7 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:"1rem", flexWrap:"wrap" }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:"'Cinzel',serif", fontSize:14, color:C.text, fontWeight:600, marginBottom:3 }}>{rec.name}</div>
                    <div style={{ fontSize:12, color:C.textD, marginBottom:5 }}>
                      Certified {rec.certifiedAt ? new Date(rec.certifiedAt).toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}) : "—"} · {rec.ballotCount||0} ballots
                    </div>
                    {recProj && (
                      <div style={{ fontFamily:"'Cinzel',serif", fontSize:11, color:recProj.color, letterSpacing:"0.06em" }}>
                        {recProj.icon} {recProj.label}
                      </div>
                    )}
                  </div>
                  <ArmBtn label="✕ Delete" confirmLabel="Delete record?" onConfirm={() => deleteRecord(i)} variant="danger" small/>
                </div>
              </Card>
            );
          })}
        </div>
      )}

      <Divider/>
      <STitle>Change Passphrase</STitle>
      <div style={{ display:"flex", gap:".5rem" }}>
        <Inp value={newPw} onChange={setNewPw} placeholder="New passphrase" type="password"/>
        <Btn variant="ghost" onClick={changePass} disabled={!newPw.trim()}>Update</Btn>
      </div>
    </div>
  );
}

/* ── App (root) ──────────────────────────────────────────── */
function App() {
  const [tab,      setTab]      = useState("results");
  const [loaded,   setLoaded]   = useState(false);
  const [candidates, setCandidates] = useState([]);
  const [votes,    setVotes]    = useState({});
  const [election, setElection] = useState(null);
  const [elHistory, setElHistory] = useState([]);
  const [notif,    setNotif]    = useState(null);
  const ntRef = useRef(null);

  /* ── Load from storage once ── */
  useEffect(() => {
    (async () => {
      const c = await sget("bh-candidates");      if (c) setCandidates(c);
      const v = await sget("bh-votes");           if (v) setVotes(v);
      const e = await sget("bh-election");        if (e) setElection(e);
      const h = await sget("bh-election-history"); if (h) setElHistory(h);
      setLoaded(true);
    })();
  }, []);

  /* ── Auto-save all state to storage whenever it changes ── */
  useEffect(() => { if (loaded) sset("bh-candidates", candidates); }, [candidates, loaded]);
  useEffect(() => { if (loaded) sset("bh-votes",      votes);      }, [votes,      loaded]);
  useEffect(() => {
    if (!loaded) return;
    if (election) sset("bh-election", election);
    else          sdel("bh-election");
  }, [election, loaded]);

  const notify = (msg, color=C.green) => {
    setNotif({ msg, color });
    clearTimeout(ntRef.current);
    ntRef.current = setTimeout(() => setNotif(null), 3200);
  };

  const handleRegister = d => setCandidates(cs => [...cs, { id:Date.now().toString(), ...d, status:"pending", submittedAt:Date.now() }]);
  const handleVote     = (u, cands) => { setVotes(v => ({...v, [u]:{ candidates:cands, status:"pending", submittedAt:Date.now() }})); notify("Ballot submitted. Awaiting Imperial verification."); };

  const pendingB  = Object.values(votes||{}).filter(v => v.status==="pending").length;
  const pendingC  = (candidates||[]).filter(c => c.status==="pending").length;
  const approvedB = Object.values(votes||{}).filter(v => v.status==="approved").length;

  const NAV = [
    { id:"results",  label:"⚖ Results" },
    { id:"vote",     label:"⚔ Vote" },
    { id:"register", label:"✦ Run for Office" },
    { id:"admin",    label:"⚜ Imperial Admin", badge:pendingC+pendingB },
  ];

  if (!loaded) return (
    <div style={{ background:C.bg, minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ fontFamily:"'Cinzel',serif", fontSize:12, color:C.redL, letterSpacing:"0.2em" }}>LOADING…</div>
    </div>
  );

  return (
    <div style={{ background:C.bg, minHeight:"100vh", color:C.text }}>
      <Gstyle/>
      <Toast msg={notif?.msg} color={notif?.color}/>

      {/* Header */}
      <div style={{ background:C.s1, borderBottom:`1px solid ${C.border}`, borderTop:`3px solid ${C.red}` }}>
        <div style={{ maxWidth:780, margin:"0 auto", padding:"0 1.5rem", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"1rem", padding:"10px 0" }}>
            <img src={COA_B64} alt="" style={{ height:54, width:"auto", opacity:.9 }}/>
            <div>
              <div style={{ fontFamily:"'Cinzel',serif", fontSize:17, color:C.text, fontWeight:700, letterSpacing:"0.04em" }}>
                Imperial Bundestag Election
              </div>
              <div style={{ fontFamily:"'Cinzel',serif", fontSize:9, color:C.textD, letterSpacing:"0.22em", textTransform:"uppercase" }}>
                {election?.name || "Empire of Lech · Electoral Commission"}
              </div>
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:".7rem", flexShrink:0 }}>
            {election?.status==="open" && (
              <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                <div style={{ width:7, height:7, borderRadius:"50%", background:C.green, animation:"pulse 1.6s infinite" }}/>
                <span style={{ fontFamily:"'Cinzel',serif", fontSize:9, color:C.green, letterSpacing:"0.15em" }}>OPEN</span>
              </div>
            )}
            {election?.status==="closed"    && <span style={{ fontFamily:"'Cinzel',serif", fontSize:9, color:C.redL, letterSpacing:"0.15em" }}>■ CLOSED</span>}
            {election?.status==="certified" && <span style={{ fontFamily:"'Cinzel',serif", fontSize:9, color:C.gold, letterSpacing:"0.15em" }}>✓ CERTIFIED</span>}
            <span style={{ fontSize:13, color:C.textD }}>{approvedB} ballot{approvedB!==1?"s":""}</span>
          </div>
        </div>
      </div>

      {/* Nav */}
      <div style={{ background:C.s2, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ maxWidth:780, margin:"0 auto", display:"flex", padding:"0 1.5rem" }}>
          {NAV.map(n => (
            <button key={n.id} onClick={() => setTab(n.id)}
              style={{ background:"none", border:"none", borderBottom:`2px solid ${tab===n.id?C.red:"transparent"}`,
                       color:tab===n.id?C.text:C.textD, fontFamily:"'Cinzel',serif", fontSize:10,
                       letterSpacing:"0.1em", textTransform:"uppercase", padding:"11px 14px",
                       cursor:"pointer", transition:"color .15s", display:"flex", alignItems:"center", gap:5 }}>
              {n.label}
              {n.badge>0 && (
                <span style={{ background:C.redD, color:C.text, fontFamily:"'Cinzel',serif",
                                fontSize:9, borderRadius:10, padding:"1px 6px" }}>{n.badge}</span>
              )}
            </button>
          ))}
        </div>
      </div>

      {/* Content — always mounted, hidden with display to avoid remount state loss */}
      <div style={{ maxWidth:780, margin:"0 auto", padding:"2rem 1.5rem" }}>
        <div style={{ display: tab==="results"  ? "block" : "none" }}><Results  candidates={candidates} votes={votes} election={election} elHistory={elHistory}/></div>
        <div style={{ display: tab==="vote"     ? "block" : "none" }}><Vote     candidates={candidates} election={election} votes={votes} onVote={handleVote}/></div>
        <div style={{ display: tab==="register" ? "block" : "none" }}><Register election={election} onSubmit={handleRegister}/></div>
        <div style={{ display: tab==="admin"    ? "block" : "none" }}><Admin    candidates={candidates} setCandidates={setCandidates} election={election} setElection={setElection} votes={votes} setVotes={setVotes} elHistory={elHistory} setElHistory={setElHistory} notify={notify}/></div>
      </div>

      <div style={{ borderTop:`1px solid ${C.border}`, padding:"1rem", fontFamily:"'Cinzel',serif", fontSize:9, color:C.textDD, letterSpacing:"0.2em", textAlign:"center" }}>
        IMPERIAL ELECTORAL COMMISSION · EMPIRE OF LECH · GOTT MIT UNS
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

  </script>

  <script>
    // Hide loading screen once React has rendered
    window.addEventListener("load", function() {
      setTimeout(function() {
        var el = document.getElementById("loading");
        if (el) el.style.display = "none";
      }, 800);
    });
  </script>
</body>
</html>
